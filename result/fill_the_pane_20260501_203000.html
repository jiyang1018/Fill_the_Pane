<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Fill the Pane v0.2 — Write Speed</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0f14;color:#e8eaf0;font-family:'Segoe UI Variable','Inter',sans-serif;padding:24px}
h1{font-size:18px;font-weight:600;color:#00d4ff;margin-bottom:4px}
.sub{font-size:12px;color:#7a8099;margin-bottom:20px}
.sub a{color:#00d4ff}
.stats{display:flex;gap:32px;margin-bottom:20px}
.sb{display:flex;flex-direction:column;gap:2px}
.sv{font-size:22px;font-weight:700}
.sl{font-size:11px;color:#7a8099}
.pv{color:#39d353}.av{color:#ff9a3c}
#cw{position:relative;background:#1a1e2a;border-radius:8px;padding:16px 16px 36px 52px}
canvas{width:100%!important;cursor:crosshair}
#tt{position:absolute;display:none;background:#1a1e2a;border:1px solid #f0c040;border-radius:6px;padding:8px 12px;font-size:12px;color:#f0c040;pointer-events:none;line-height:1.6;white-space:nowrap;z-index:10}
.xl{text-align:center;font-size:11px;color:#7a8099;margin-top:6px}
.yl{position:absolute;left:6px;top:50%;transform:translateY(-50%) rotate(-90deg);font-size:11px;color:#7a8099;white-space:nowrap}
.ft{margin-top:16px;font-size:11px;color:#7a8099}
</style>
</head>
<body>
<h1>Fill the Pane v0.2 — Write Speed</h1>
<div class='sub'>Generated by Fill the Pane v0.2 &nbsp;&middot;&nbsp; <a href='https://github.com/jiyang1018/Fill_the_Pane' target='_blank'>https://github.com/jiyang1018/Fill_the_Pane</a></div>
<div class='stats'>
<div class='sb'><span class='sv pv'>609.8</span><span class='sl'>Peak MB/s</span></div>
<div class='sb'><span class='sv av'>583.0</span><span class='sl'>Average MB/s</span></div>
<div class='sb'><span class='sv'>25.1s</span><span class='sl'>Duration</span></div>
</div>
<div id='cw'><div class='yl'>Write Speed (MB/s)</div>
<canvas id='c'></canvas><div id='tt'></div></div>
<div class='xl'>Drive Capacity Written (GB)</div>
<div class='ft'>Hover over the graph to inspect data points.</div>
<script>
const XS=[0.291, 0.5557, 0.835, 1.126, 1.4199, 1.71, 1.999, 2.291, 2.5723, 2.8662, 3.1475, 3.4414, 3.7266, 4.0068, 4.29, 4.5801, 4.8701, 5.1611, 5.4463, 5.7402, 6.0176, 6.3086, 6.6025, 6.8867, 7.1826, 7.4658, 7.7588, 8.042, 8.3359, 8.6338, 8.9209, 9.1982, 9.4648, 9.7588, 10.043, 10.3301, 10.5908, 10.8828, 11.1787, 11.4717, 11.7334, 12.0234, 12.3135, 12.6006, 12.873, 13.1582, 13.4385, 13.7275, 14.0078, 14.2793],YS=[594.33, 541.27, 571.04, 594.94, 600.96, 592.58, 590.57, 596.56, 575.75, 601.21, 575.98, 601.21, 583.41, 572.03, 578.27, 593.29, 592.02, 595.18, 583.53, 597.28, 566.55, 594.63, 600.75, 577.5, 604.52, 579.3, 599.11, 565.65, 600.37, 609.8, 587.6, 553.55, 545.06, 601.08, 581.27, 587.3, 533.77, 594.09, 605.8, 599.96, 535.75, 592.32, 593.64, 587.4, 557.38, 583.65, 573.32, 591.99, 573.89, 539.85],EL=[0.5, 1.0, 1.5, 2.0, 2.5, 3.01, 3.51, 4.01, 4.51, 5.01, 5.51, 6.01, 6.51, 7.01, 7.51, 8.01, 8.52, 9.02, 9.52, 10.02, 10.52, 11.02, 11.52, 12.03, 12.53, 13.03, 13.53, 14.04, 14.54, 15.05, 15.55, 16.06, 16.56, 17.06, 17.56, 18.06, 18.56, 19.06, 19.56, 20.06, 20.57, 21.07, 21.57, 22.07, 22.57, 23.07, 23.57, 24.07, 24.57, 25.08],UNIT='GB';
const PI=XS.indexOf?YS.indexOf(Math.max(...YS)):0;
const cv=document.getElementById('c'),tt=document.getElementById('tt');
const cw=document.getElementById('cw');
const PL=0,PR=16,PT=16,PB=8;
function draw(hi){
  const W=cv.clientWidth,H=Math.round(W*9/16);
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  const xMx=Math.max(...XS)*1.02,yMx=Math.max(...YS)*1.18;
  const px=x=>PL+(x/xMx)*(W-PL-PR);
  const py=y=>H-PB-(y/yMx)*(H-PT-PB);
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#252a38';ctx.lineWidth=0.5;ctx.setLineDash([4,4]);
  [0.25,0.5,0.75,1].forEach(r=>{
    const yv=yMx*r;
    ctx.beginPath();ctx.moveTo(PL,py(yv));ctx.lineTo(W-PR,py(yv));ctx.stroke();
    ctx.fillStyle='#7a8099';ctx.font='10px sans-serif';
    ctx.textAlign='right';ctx.fillText(Math.round(yv),PL-4,py(yv)+4);
  });
  [0,0.25,0.5,0.75,1].forEach(r=>{
    const xv=xMx*r;
    ctx.beginPath();ctx.moveTo(px(xv),PT);ctx.lineTo(px(xv),H-PB);ctx.stroke();
    ctx.fillStyle='#7a8099';ctx.textAlign='center';
    ctx.fillText(xv.toFixed(1),px(xv),H-PB+12);
  });
  ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(px(XS[0]),py(0));
  XS.forEach((x,i)=>ctx.lineTo(px(x),py(YS[i])));
  ctx.lineTo(px(XS[XS.length-1]),py(0));ctx.closePath();
  ctx.fillStyle='rgba(0,212,255,0.12)';ctx.fill();
  ctx.beginPath();ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;ctx.lineJoin='round';
  XS.forEach((x,i)=>i===0?ctx.moveTo(px(x),py(YS[i])):ctx.lineTo(px(x),py(YS[i])));
  ctx.stroke();
  XS.forEach((x,i)=>{
    ctx.beginPath();ctx.arc(px(x),py(YS[i]),3.5,0,Math.PI*2);
    ctx.fillStyle=i===hi?'#f0c040':'#ff6b35';ctx.fill();
  });
  const px2=px(XS[PI]),py2=py(YS[PI]);
  ctx.strokeStyle='#39d353';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(px2,py2);ctx.lineTo(px2+10,py2-16);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#39d353';ctx.font='bold 11px sans-serif';
  ctx.textAlign='left';ctx.fillText('Peak '+Math.round(YS[PI])+' MB/s',px2+12,py2-16);
  if(hi>=0){
    ctx.strokeStyle='rgba(240,192,64,0.8)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(px(XS[hi]),PT);ctx.lineTo(px(XS[hi]),H-PB);ctx.stroke();
    ctx.setLineDash([]);
  }
  cv._px=px;cv._py=py;cv._xMx=xMx;
}
function nearest(cx){
  const r=cv.getBoundingClientRect();
  const mx=(cx-r.left)*(cv.width/r.width);
  let b=-1,bd=Infinity;
  XS.forEach((x,i)=>{const d=Math.abs(cv._px(x)-mx);if(d<bd){bd=d;b=i;}});
  return b;
}
cv.addEventListener('mousemove',e=>{
  const i=nearest(e.clientX);if(i<0)return;
  draw(i);
  const r=cv.getBoundingClientRect(),cwr=cw.getBoundingClientRect();
  const cpx=cv._px(XS[i])*(r.width/cv.width);
  const cpy=cv._py(YS[i])*(r.height/cv.height);
  let lx=r.left-cwr.left+cpx+12;
  const tw=tt.offsetWidth||160;
  if(lx+tw>cw.offsetWidth-8)lx=r.left-cwr.left+cpx-tw-12;
  tt.style.left=lx+'px';
  tt.style.top=(r.top-cwr.top+cpy-50)+'px';
  tt.style.display='block';
  tt.innerHTML=XS[i].toFixed(2)+' '+UNIT+' written<br>'+EL[i].toFixed(1)+'s elapsed<br>'+YS[i].toFixed(1)+' MB/s';
});
cv.addEventListener('mouseleave',()=>{tt.style.display='none';draw(-1);});
new ResizeObserver(()=>draw(-1)).observe(cv);
draw(-1);
</script>
</body>
</html>
