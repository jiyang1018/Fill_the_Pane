  let lx=r.left-cwr.left+cpx+12;
  const tw=tt.offsetWidth||160;
  if(lx+tw>cw.offsetWidth-8)lx=r.left-cwr.left+cpx-tw-12;
  tt.style.left=lx+'px';
  tt.style.top=(r.top-cwr.top+cpy-50)+'px';
  tt.style.display='block';
  tt.innerHTML=XS[i].toFixed(2)+' '+UNIT+' written<br>'+EL[i].toFixed(1)+'s elapsed<br>'+YS[i].toFixed(1)+' MB/s';
});
cv.addEventListener('mouseleave',()=>{tt.style.display='none';draw(-1);});
new ResizeObserver(()=>draw(-1)).observe(cv);
draw(-1);
</script>
</body>
