name: Build and Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install matplotlib psutil pillow pyinstaller

      - name: Build ftp_loop.dll
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          if ($vsPath) {
            $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"
            cmd /c "`"$vcvars`" && cl /O2 /LD /EHsc ftp_loop.cpp /Fe:ftp_loop.dll"
          } else {
            g++ -O2 -shared -o ftp_loop.dll ftp_loop.cpp -lkernel32 -static-libgcc -static-libstdc++
          }

      - name: Build exe
        run: python -m PyInstaller fill_the_pane.spec --noconfirm

      - name: Get version from tag
        id: version
        run: echo "VERSION=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Fill the Pane ${{ steps.version.outputs.VERSION }}
          files: "dist/Fill the Pane ${{ steps.version.outputs.VERSION }}.exe"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
